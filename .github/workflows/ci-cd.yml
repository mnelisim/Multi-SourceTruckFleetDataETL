name: Multi-SourceFleetDataETL CI/CD


on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-test-deploy:        
    runs-on: ubuntu-latest
    
    services:
      postgres_db:
        image: postgres:15
        env:
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_DB: truck_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U user -d truck_db"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build Airflow Docker image
      run: docker build -t fleet-airflow:latest -f DOCKERFILE .
      

    - name: Run smoke test
      env:
        # Reference the secret stored in GitHub Repository Settings
        POSTGRES_URL: ${{ secrets.POSTGRES_URL }}
      run: |
        docker run --rm \
          -v $PWD:/app \
          -e PYTHONPATH=/app \
          -e POSTGRES_URL="$POSTGRES_URL" \
          fleet-airflow:latest \
          python /app/pipeline/etl_pipeline.py --test

    - name: Slack Notification
      uses: rtCamp/action-slack-notify@v2
      if: always() # <--- CRITICAL: This ensures I get a message even if the build fails
      env:
        SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
        SLACK_TITLE: "Build Status: ${{ job.status }}"
        SLACK_MESSAGE: "Multi-SourceFleetDataETL result: ${{ job.status }}"
        SLACK_COLOR: ${{ job.status == 'success' && 'good' || 'danger' }}