name: Multi-SourceFleetDataETL CI/CD

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-test-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build Airflow Docker image
      run: docker build -t fleet-airflow:latest -f DOCKERFILE .

    - name: Run smoke test
      env:
        # Reference the secret stored in your GitHub Repository Settings
        POSTGRES_URL: ${{ secrets.POSTGRES_URL }}
      run: |
        docker run --rm \
          -v $PWD:/app \
          -e PYTHONPATH=/app \
          -e POSTGRES_URL="$POSTGRES_URL" \
          fleet-airflow:latest \
          python /app/pipeline/etl_pipeline.py --test